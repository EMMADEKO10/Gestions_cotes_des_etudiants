
<!DOCTYPE html>
<html>
<head>
  <title>Student Marks</title>
  <link rel="stylesheet" type="text/css" href="https://cdn3.devexpress.com/jslib/9.5.1/css/dx.common.css" />
  <link rel="stylesheet" type="text/css" href="https://cdn3.devexpress.com/jslib/9.5.1/css/dx.light.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dx-viewport">
    <div class="container">
      <h1>Student Marks</h1>
      <div id="input-section">
        <div id="num-students-container" class="dx-field">
          <div class="dx-field-label">Enter number of students:</div>
          <div class="dx-field-value">
            <div id="num-students"></div>
          </div>
        </div>
        <div id="num-subjects-container" class="dx-field">
          <div class="dx-field-label">Enter number of subjects:</div>
          <div class="dx-field-value">
            <div id="num-subjects"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-value">
            <div id="submit-btn"></div>
          </div>
        </div>
      </div>

      <div id="data-section" style="display: none;">
        <h2>Enter Subject Names</h2>
        <div id="subject-names"></div>

        <h2>Enter Student Details</h2>
        <div id="students"></div>

        <div class="dx-field">
          <div class="dx-field-value">
            <div id="calculate-btn"></div>
          </div>
        </div>
      </div>

      <div id="result-section" style="display: none;">
        <h2>Final Marks for All Students</h2>
        <div id="student-marks"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn3.devexpress.com/jslib/9.5.1/js/dx.all.js"></script>
  <script src="script.js"></script>
</body>
</html>
